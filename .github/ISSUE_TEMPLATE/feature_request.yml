name: 💡 Feature Request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? We'd love to hear it. Check the [Coming Soon](https://github.com/TanaTTV/Discord-Archiver#-coming-soon) section first to see if it's already planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do that you can't do right now?
      placeholder: "I want to export my DMs but there's no option for that..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe the feature as clearly as you can.
      placeholder: "Add a DM backup option in the web UI that lets me select individual conversations..."
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - Nice to have
        - Would use it regularly
        - Blocking me from using the tool
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Any alternatives you've considered?
      description: Workarounds you're currently using, or other tools you've tried.
